<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wells Fargo | Pay & Transfer</title>
    <style>
        /* OFFICIAL WELLS FARGO THEME */
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f4; /* Official light-gray backing */
            color: #222222;
        }

        /* TOP HEADER */
        .top-header {
            background-color: #D71920; /* Wells Fargo Red Primary */
            color: #ffffff;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            border-bottom: 4px solid #F4B223; /* Wells Fargo Signature Gold Trim */
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .back-arrow {
            font-size: 24px;
            text-decoration: none;
            color: #ffffff;
            margin-right: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .top-header h2 {
            margin: 0;
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* GRID MENU */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 15px;
            margin-top: 10px;
        }

        /* TILE STYLING */
        .tile {
            background: #ffffff;
            border-radius: 6px; /* Wells Fargo clean corporate edges */
            padding: 25px 10px;
            text-align: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            transition: transform 0.1s ease, background-color 0.2s;
            border: 1px solid #e2e2e2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 150px;
        }

        .tile:active {
            background-color: #fff9f9;
            border-color: #D71920;
        }

        .tile a {
            text-decoration: none;
            color: inherit;
            display: block;
            width: 100%;
        }

        .icon {
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
        }

        .tile h3 {
            margin: 0;
            font-size: 14px;
            color: #9B0000; /* Deep crimson accent headers */
            font-weight: 700;
            letter-spacing: 0.2px;
        }

        .tile p {
            margin: 8px 0 0;
            font-size: 12px;
            color: #666666;
            line-height: 1.4;
        }

        /* Responsive tweak */
        @media (max-width: 350px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<header class="top-header">
    <a href="./login.html" class="back-arrow">&#8592;</a>
    <h2>Pay & Transfer</h2>
</header>

<section class="grid">

    <div class="tile">
        <a href="./square.html">
            <div class="icon">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#D71920" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M7 16V4M7 4L3 8M7 4L11 8M17 8v12M17 20l4-4M17 20l-4-4"/>
                </svg>
            </div>
            <h3>To/From Me</h3>
            <p>Between Wells Fargo accounts</p>
        </a>
    </div>

    <div class="tile">
        <a href="#">
            <div class="icon">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#D71920" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="2" y1="12" x2="22" y2="12"/>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                </svg>
            </div>
            <h3>Wire Transfers</h3>
            <p>Domestic or International Wires</p>
        </a>
    </div>

    <div class="tile">
        <a href="#">
            <div class="icon">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="#6d1ed4">
                    <path d="M19.14 12.94c0 2.13-1.04 3.48-3.11 3.48H9.68l5.88 5.48-1.42 1.4L6.1 16.03V12.7h6.2c1.4 0 1.94-.76 1.94-1.74 0-.96-.54-1.7-1.94-1.7H6.1V6.1h6.35l-5.88-5.5 1.42-1.4 8.04 7.28v3.31h-6.2c-1.4 0-1.94.75-1.94 1.73s.54 1.71 1.94 1.71h6.36v-.3z"/>
                </svg>
            </div>
            <h3>Send with Zelle®</h3>
            <p>Fast, secure ways to pay friends</p>
        </a>
    </div>

    <div class="tile">
        <a href="#">
            <div class="icon">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#D71920" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="16" rx="2"/>
                    <line x1="3" y1="10" x2="21" y2="10"/>
                    <line x1="7" y1="15" x2="7.01" y2="15"/>
                    <line x1="11" y1="15" x2="13" y2="15"/>
                </svg>
            </div>
            <h3>Bill Pay</h3>
            <p>Set up recurring bills or one-time</p>
        </a>
    </div>

</section>

<div style="text-align: center; margin-top: 40px; color: #757575; font-size: 11px; padding: 20px; line-height: 1.6;">
    <p>© 2026 Wells Fargo Bank, N.A. All rights reserved. Member FDIC.</p>
</div>

</body>
</html>
